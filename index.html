<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>31-Day Exam Mastery Plan — Kopaline University</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- HERO SECTION -->
    <div class="hero">
      <h1>31-Day <span>Exam Mastery</span> Plan</h1>
      <p>
        Kopaline University &nbsp;·&nbsp; BSc Accounting &amp; Finance
        &nbsp;·&nbsp; 6 Core Courses
      </p>
    </div>

    <!-- STATS CARDS -->
    <div class="stats">
      <div class="stat-card">
        <span class="num">31</span><span class="lbl">Days</span>
      </div>
      <div class="stat-card">
        <span class="num">6</span><span class="lbl">Courses</span>
      </div>
      <div class="stat-card">
        <span class="num">120</span><span class="lbl">Study Hrs</span>
      </div>
      <div class="stat-card">
        <span class="num">5</span><span class="lbl">Phases</span>
      </div>
    </div>


    <!-- ═══════════════════════════════════════════
         AI TUTOR BLOCK — paste between stats & container
         ═══════════════════════════════════════════ -->
    <div class="ai-tutor-wrap">
      <div class="ai-tutor-card">
        <div class="ai-tutor-header">
          <span class="ai-tutor-icon">🎓</span>
          <div>
            <h2 class="ai-tutor-title">Ask Your AI Tutor</h2>
            <p class="ai-tutor-sub">Powered by Groq &nbsp;·&nbsp; Kopaline University Study Assistant</p>
          </div>
        </div>
        <div class="ai-input-row">
          <input
            type="text"
            id="aiQuestion"
            class="ai-question-input"
            placeholder="e.g. Explain double-entry bookkeeping, or What is the capital asset pricing model?"
            autocomplete="off"
          />
          <button id="aiAskBtn" class="ai-ask-btn" onclick="askAITutor()">Ask →</button>
        </div>
        <div class="ai-chips">
          <button class="ai-chip-btn" onclick="document.getElementById('aiQuestion').value=this.dataset.q;askAITutor()" data-q="What is the difference between gross profit and net profit?">Gross vs Net Profit</button>
          <button class="ai-chip-btn" onclick="document.getElementById('aiQuestion').value=this.dataset.q;askAITutor()" data-q="Explain the concept of materiality in auditing">Materiality in Auditing</button>
          <button class="ai-chip-btn" onclick="document.getElementById('aiQuestion').value=this.dataset.q;askAITutor()" data-q="What is the CAPM formula and when do I use it?">CAPM Formula</button>
          <button class="ai-chip-btn" onclick="document.getElementById('aiQuestion').value=this.dataset.q;askAITutor()" data-q="How does marginal costing differ from absorption costing?">Marginal vs Absorption</button>
        </div>
        <!-- AI response renders here -->
        <div id="aiResponse" class="ai-response-box"></div>
      </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="container">
      <!-- Course Tabs -->
      <div class="course-scroller" id="courseTabs"></div>

      <!-- Main Course Content -->
      <div id="courseContent"></div>
      
      <!-- Phase Tabs -->
      <div class="phase-scroller" id="phaseTabs"></div>
      <!-- Progress Bar -->
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="progressLabel">Phase progress</span>
          <span id="progressPct">20%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressBar" style="width: 20%"></div>
        </div>
      </div>
      <!-- Phase Banner -->
      <div class="phase-banner" id="phaseBanner"></div>
    </div>

    <!-- External Scripts -->
    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
